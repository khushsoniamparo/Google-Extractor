<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Settings | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --border: #e2e8f0;
            --primary: #6366f1; /* Changed to Indigo for a lighter/cleaner feel */
            --primary-glow: rgba(99, 102, 241, 0.08);
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border); padding: 40px 20px; z-index: 100;
        }

        .logo { font-size: 1.4rem; font-weight: 900; color: var(--text-main); margin-bottom: 48px; }
        .logo span { color: var(--primary); }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted);
            text-decoration: none; border-radius: 8px; font-weight: 600; margin-bottom: 4px;
            transition: all 0.2s; font-size: 0.9rem;
        }
        .nav-item:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-item.active { background: var(--primary-glow); color: var(--primary); border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; margin-left: -20px; padding-left: 33px; }

        .content { margin-left: 260px; padding: 64px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; }

        .panel { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; padding: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        input[type="text"], input[type="password"], select {
            width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); font-family: 'Outfit'; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }

        .btn {
            padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none;
            font-size: 0.9rem; transition: all 0.2s; font-family: 'Outfit';
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .section-title { font-size: 1.1rem; font-weight: 800; margin: 32px 0 16px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--primary); display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Extractor<span>.</span>Admin</div>
        <nav style="display: flex; flex-direction: column; height: calc(100% - 140px);">
            <a href="{% url 'admin_dashboard' %}" class="nav-item">Dashboard</a>
            <a href="{% url 'user_management' %}" class="nav-item">Users</a>
            <a href="{% url 'package_management' %}" class="nav-item">Packages</a>
            <a href="{% url 'proxy_settings' %}" class="nav-item">Proxies</a>
            <a href="{% url 'payment_management' %}" class="nav-item">Payments</a>
            <a href="{% url 'payment_settings' %}" class="nav-item active">Settings</a>
            
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <a href="{% url 'admin_hub_logout' %}" class="nav-item" style="color: var(--danger);">
                    Logout
                </a>
            </div>
        </nav>
    </div>

    <div class="content">
        <div class="header">
            <div>
                <h1>Payment Control</h1>
                <p style="color: var(--text-muted);">Configure your payment keys and gateway settings here.</p>
            </div>
        </div>

        <div class="panel">
            <form method="POST">
                {% csrf_token %}
                
                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    Razorpay Configuration
                </div>
                <div class="form-group">
                    <label>Key ID</label>
                    <input type="text" name="razorpay_key_id" value="{{ settings.razorpay_key_id|default:'' }}" placeholder="rzp_test_...">
                </div>
                <div class="form-group">
                    <label>Key Secret</label>
                    <input type="password" name="razorpay_key_secret" value="{{ settings.razorpay_key_secret|default:'' }}" placeholder="••••••••••••">
                </div>

                <div class="section-title" style="margin-top: 48px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 15h10M7 9h10"/><rect x="3" y="4" width="18" height="16" rx="2"/></svg>
                    PayPal Configuration
                </div>
                <div class="form-group">
                    <label>Client ID</label>
                    <input type="text" name="paypal_client_id" value="{{ settings.paypal_client_id|default:'' }}" placeholder="Client ID from PayPal Developer Portal">
                </div>
                <div class="form-group">
                    <label>Client Secret</label>
                    <input type="password" name="paypal_client_secret" value="{{ settings.paypal_client_secret|default:'' }}" placeholder="••••••••••••">
                </div>
                <div class="form-group">
                    <label>Environment Mode</label>
                    <select name="paypal_mode">
                        <option value="sandbox" {% if settings.paypal_mode == 'sandbox' %}selected{% endif %}>Sandbox (Testing)</option>
                        <option value="live" {% if settings.paypal_mode == 'live' %}selected{% endif %}>Live (Production)</option>
                    </select>
                </div>

                <div style="margin-top: 40px; display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
